{% extends "base.html" %}
{% block title %}Register - Snake Game{% endblock %}
{% block content %}
<section class="card auth-card">
    <div style="text-align:center; margin-bottom: 24px;">
        <i class="fa-solid fa-user-plus" style="color:var(--accent-cyan); font-size:2.5rem; margin-bottom:16px;"></i>
        <h2 style="margin:0; font-size:1.8rem;">NEW PILOT REGISTRATION</h2>
        <p class="subtle" style="margin-top:8px; color:var(--accent-cyan);">Create your digital entity</p>
    </div>
    
    <form method="POST" style="display:grid; gap:16px;">
        <div>
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div>
            <label>Email</label>
            <input type="email" name="email" required style="width:100%; background-color:rgba(0,0,0,0.3); border:1px solid var(--border-light); color:var(--text-main); padding:12px 16px; border-radius:4px; font-family:var(--font-body); outline:none;">
        </div>
        <div>
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-cyan" style="width:100%; margin-top:8px;">REGISTER <i class="fa-solid fa-check"></i></button>
    </form>
    
    <p style="text-align:center; margin-top:24px; color:var(--text-muted); font-size:0.9rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--accent-green); font-weight:600;">Login here</a>.
    </p>
</section>
{% endblock %}
