<h1>Student Dashboard</h1>

<h2>Register for a course</h2>
<form method="POST" action="/register-course">
    <select name="course_id" required>
        {% for course in courses %}
            <option value="{{ course[1] }}">{{ course[2] }}</option>
        {% endfor %}
    </select>
    <button type="submit">Register</button>
</form>

<h2>Drop a course</h2>
<form method="POST" action="/drop-course">
    <select name="course_id" required>
        {% for course in registered %}
            <option value="{{ course[0] }}">{{ course[0] }}</option>
        {% endfor %}
    </select>
    <button type="submit">Drop</button>
</form>

<h2>Registered Courses</h2>
<ul>
    {% for course in registered %}
        <li>{{ course[0] }}</li>
    {% endfor %}
</ul>

<h2>View Pre-requisite Courses</h2>
<form method="POST" action="/prereqs">
    <select name="course_id" required>
        {% for course in courses %}
            <option value="{{ course[1] }}">{{ course[2] }}</option>
        {% endfor %}
    </select>
    <button type="submit">View Pre-reqs</button>
</form>
